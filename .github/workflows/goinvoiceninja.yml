name: GoInvoiceNinja

on:
  pull_request:
    paths:
      - 'apps/GoInvoiceNinja/**'
      - '.github/workflows/goinvoiceninja.yml'

  push:
    branches:
      - main
    paths:
      - 'apps/GoInvoiceNinja/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/GoInvoiceNinja

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
